<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PuntoZero - Estudio de Ingeniería de Software formal, minimalista y de alto rendimiento.">
    <title>PuntoZero | Software Engineering Studio</title>
    
    <!-- Librería Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Enlace a la hoja de estilos principal -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- VISTA MÓVIL (App Nativa) -->
    <main id="mobile-app">
        <header class="mobile-header">
            <!-- Solo el logo en texto plano 'PuntoZero' -->
            <h1 class="mobile-logo">PuntoZero</h1>
        </header>

        <div class="mobile-services-grid">
            <button class="split-btn">Desarrollo Web</button>
            <button class="split-btn">Impresión 3D</button>
            <button class="split-btn">Cartas Digitales para Bares</button>
        </div>
    </main>

    <!-- VISTA ESCRITORIO (Escaparate Tecnológico) -->
    <main id="desktop-showcase">
        <div class="desktop-left">
            <header class="desktop-header">
                <img src="logo_PuntoZero_blanco.png" alt="Icono" class="desktop-logo-icon" style="height:21px; width:auto; filter: invert(1);">
                <span class="desktop-logo-text">PuntoZero.</span>
            </header>
            
            <div class="desktop-content">
                <h1 class="desktop-title">Ingeniería<br>en su estado<br>más puro.</h1>
                <p class="desktop-subtitle">Desarrollamos soluciones de software robustas, escalables y eficientes. La perfección técnica es nuestra norma de diseño.</p>
                
                <nav class="desktop-menu">
                    <ul>
                        <li><a href="#servicios" class="desktop-link">Servicios</a></li>
                        <li><a href="#metodologia" class="desktop-link">Metodología</a></li>
                        <li><a href="#contacto" class="desktop-link">Contacto</a></li>
                    </ul>
                </nav>
            </div>

            <footer class="desktop-footer">
                <p>&copy; <span id="current-year"></span> PuntoZero. Todos los derechos reservados.</p>
            </footer>
        </div>

        <div class="desktop-right">
            <!-- Enorme preparado para alojar el logo 3D -->
            <div id="canvas-container"></div>
        </div>
    </main>

    <!-- Script principal con la lógica condicional -->
    <script src="js/main.js"></script>
</body>
</html>
